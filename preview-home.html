<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简记 - 首页预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif; background: #E8E8ED; display: flex; justify-content: center; padding: 20px; }
  .phone { width: 390px; min-height: 844px; background: #F5F5F7; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); position: relative; }
  .status-bar { height: 54px; background: #F5F5F7; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
  .status-bar span { font-size: 15px; font-weight: 600; color: #1C1C1E; }
  .content { padding: 8px 20px 20px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .header-left {}
  .date-text { font-size: 14px; color: #007AFF; margin-bottom: 2px; }
  .title-text { font-size: 28px; font-weight: 700; color: #1C1C1E; }
  .calendar-btn { width: 40px; height: 40px; border-radius: 12px; background: rgba(0,122,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .glass-card { background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 0.5px solid rgba(255,255,255,0.5); box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .expense-income-card { border-radius: 24px; padding: 24px; margin-bottom: 16px; }
  .expense-income-row { display: flex; align-items: center; }
  .expense-col { flex: 1; }
  .income-col { flex: 1; text-align: right; }
  .label { font-size: 12px; color: #8E8E93; margin-bottom: 4px; }
  .expense-amount { font-size: 32px; font-weight: 700; color: #FF3B30; }
  .income-amount { font-size: 32px; font-weight: 700; color: #34C759; }
  .divider { width: 1px; height: 48px; background: rgba(142,142,147,0.2); margin: 0 16px; }
  .progress-bar-container { margin-top: 16px; height: 4px; background: rgba(0,0,0,0.04); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 30%; background: linear-gradient(90deg, #FF3B30, #FF6B6B); border-radius: 2px; transition: width 0.5s ease; }
  .budget-text { font-size: 11px; color: #8E8E93; margin-top: 6px; }
  .category-card { border-radius: 20px; padding: 16px; margin-bottom: 20px; }
  .category-title { font-size: 14px; font-weight: 600; color: #1C1C1E; margin-bottom: 12px; }
  .category-row { display: flex; gap: 8px; }
  .category-chip { flex: 1; text-align: center; padding: 10px 0; border-radius: 14px; }
  .category-chip.emoji { font-size: 20px; }
  .category-chip.name { font-size: 11px; color: #8E8E93; margin-top: 4px; }
  .category-chip.amount { font-size: 14px; font-weight: 600; color: #1C1C1E; margin-top: 2px; }
  .all-chip { flex: 1; text-align: center; padding: 10px 0; border-radius: 14px; background: rgba(0,0,0,0.04); }
  .all-chip .dots { font-size: 20px; }
  .all-chip .label { font-size: 11px; color: #8E8E93; }
  .all-chip .arrow { font-size: 14px; font-weight: 600; color: #007AFF; }
  .section-title { font-size: 16px; font-weight: 600; color: #1C1C1E; margin-bottom: 12px; }
  .tx-card { border-radius: 16px; margin-bottom: 10px; overflow: hidden; }
  .tx-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.5)); border: 0.5px solid rgba(0,0,0,0.06); }
  .tx-left { flex: 1; }
  .tx-category { font-size: 15px; font-weight: 500; color: #1C1C1E; }
  .tx-meta { font-size: 12px; color: #8E8E93; margin-top: 2px; }
  .tx-meta span { margin-right: 6px; }
  .tx-amount { font-size: 16px; font-weight: 700; }
  .tx-amount.expense { color: #FF3B30; }
  .tx-amount.income { color: #34C759; }
  .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; height: 83px; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 0.5px solid rgba(0,0,0,0.06); display: flex; align-items: flex-start; justify-content: space-around; padding-top: 8px; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; color: #8E8E93; }
  .nav-item.active .nav-label { color: #007AFF; }
  .fab { position: absolute; bottom: 83px; left: 50%; transform: translateX(-50%); width: 52px; height: 52px; border-radius: 16px; background: #007AFF; color: white; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,122,255,0.3); margin-bottom: 8px; }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar"><span>9:41</span></div>
  <div class="content">
    <div class="header">
      <div class="header-left">
        <div class="date-text">5月22日 周四</div>
        <div class="title-text">今日收支</div>
      </div>
      <div class="calendar-btn">📅</div>
    </div>

    <div class="glass-card expense-income-card">
      <div class="expense-income-row">
        <div class="expense-col">
          <div class="label">支出</div>
          <div class="expense-amount">¥128</div>
        </div>
        <div class="divider"></div>
        <div class="income-col">
          <div class="label">收入</div>
          <div class="income-amount">¥5,000</div>
        </div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
      <div class="budget-text">月预算 ¥3,000 · 已用 30%</div>
    </div>

    <div class="glass-card category-card">
      <div class="category-title">分类概览</div>
      <div class="category-row">
        <div class="category-chip" style="background:rgba(255,59,48,0.08);">
          <div class="emoji">🍜</div>
          <div class="name">餐饮</div>
          <div class="amount">¥68</div>
        </div>
        <div class="category-chip" style="background:rgba(0,122,255,0.08);">
          <div class="emoji">🚗</div>
          <div class="name">交通</div>
          <div class="amount">¥32</div>
        </div>
        <div class="category-chip" style="background:rgba(255,149,0,0.08);">
          <div class="emoji">🛍</div>
          <div class="name">购物</div>
          <div class="amount">¥28</div>
        </div>
        <div class="all-chip">
          <div class="dots">⋯</div>
          <div class="label">全部</div>
          <div class="arrow">→</div>
        </div>
      </div>
    </div>

    <div class="section-title">今日交易</div>

    <div class="tx-card">
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-category">餐饮 · 午餐</div>
          <div class="tx-meta"><span>12:30</span><span>微信</span></div>
        </div>
        <div class="tx-amount expense">-¥35</div>
      </div>
    </div>
    <div class="tx-card">
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-category">交通 · 地铁</div>
          <div class="tx-meta"><span>08:15</span><span>支付宝</span></div>
        </div>
        <div class="tx-amount expense">-¥6</div>
      </div>
    </div>
    <div class="tx-card">
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-category">购物 · 日用品</div>
          <div class="tx-meta"><span>14:20</span><span>现金</span></div>
        </div>
        <div class="tx-amount expense">-¥28</div>
      </div>
    </div>
    <div class="tx-card">
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-category">餐饮 · 早餐</div>
          <div class="tx-meta"><span>07:45</span><span>微信</span></div>
        </div>
        <div class="tx-amount expense">-¥33</div>
      </div>
    </div>
    <div class="tx-card">
      <div class="tx-item">
        <div class="tx-left">
          <div class="tx-category">工资 · 月薪</div>
          <div class="tx-meta"><span>10:00</span><span>银行卡</span></div>
        </div>
        <div class="tx-amount income">+¥5,000</div>
      </div>
    </div>
  </div>

  <div class="fab">+</div>
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">首页</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📊</div>
      <div class="nav-label">报表</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">👤</div>
      <div class="nav-label">我的</div>
    </div>
  </div>
</div>
</body>
</html>
