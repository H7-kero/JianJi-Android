# Gradle 全局配置文件

# JVM 参数，设置最大内存为 2GB，编码为 UTF-8
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# 启用 AndroidX 库（新版 Android 支持库）
android.useAndroidX=true

# Kotlin 代码风格：official 表示使用官方推荐的代码风格
kotlin.code.style=official

# 启用 Gradle 守护进程，加速后续构建
org.gradle.daemon=true

# 启用并行编译，加速构建
org.gradle.parallel=true

ksp.useKSP2=false
